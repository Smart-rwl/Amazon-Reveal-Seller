name: 🚀 Feature Request
description: Suggest an idea or improvement for this script
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have a great idea to make this tool better for Amazon Sellers? Tell me about it!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "Example: I'm frustrated when I have to manually copy ASINs one by one..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: "Example: Add a 'Copy All ASINs' button to the footer."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've thought of.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
